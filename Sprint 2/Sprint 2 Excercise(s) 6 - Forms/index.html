<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <title>Forms</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body class="page">
    <div class="form-container">
      <form class="form">
        <h1 class="form__title">Log in</h1>
        <fieldset class="form__fieldset">
            <label for="username" class="form__label">Username</label>
          <input type="text" class="form__input" id="username"/>
          <label for="password" class="form__label">Password</label>
          <input type="password" class="form__input" id="password"/>
        </fieldset>
        <fieldset class="form__fieldset"></fieldset>
        <fieldset class="form__fieldset">
          <!--Add your code here-->
          <button class="form__button" type="submit"></button>
          <button class="form__button" type="reset"></button>
        </fieldset>
      </form>
    </div>
  </body>
</html>
