<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quick Bytes Cafe</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.cdnfonts.com/css/cabinet-grotesk"
      rel="stylesheet"
    />
  </head>
  <body class="page">
    <main>
      <section class="reservation page__section">
        <img
          src="./images/shiny-lid.png"
          alt="Shiny restaurant lid illustration"
          class="reservation__image"
        />
        <h2 class="reservation__title">Reservations <br />are Recommended</h2>
        <button type="button" class="reservation__button">Book a table</button>
      </section>
    </main>
    <div class="modal" id="reservation-modal">
      <div class="modal__content">
        <button type="button" class="modal__close-btn"></button>
        <h3 class="modal__title">Book a table</h3>
        <form class="modal__form form" name="reservation" novalidate>
          <fieldset class="form__fieldset">
            <label for="name-input" class="form__label">
              Name
              <input
                id="name-input"
                type="text"
                class="form__input"
                name="name"
                required
                placeholder="Name"
              />
            </label>
            <label for="count-input" class="form__label">
              Number of People
              <input
                id="count-input"
                type="number"
                class="form__input"
                name="personCount"
                min="1"
                max="8"
                required
                placeholder="1-8"
              />
            </label>
            <label for="datetime-input" class="form__label">
              Date &amp; Time
              <input
                id="datetime-input"
                type="datetime-local"
                class="form__input"
                name="dateTime"
                required
              />
            </label>
            <label for="email-input" class="form__label">
              Your Email
              <input
                id="email-input"
                type="email"
                class="form__input"
                name="email"
                required
                placeholder="email@email.com"
              />
            </label>
          </fieldset>
          <fieldset class="form__fieldset">
            <button type="submit" class="form__submit-btn">Book a table</button>
          </fieldset>
        </form>
      </div>
    </div>
    <div class="modal modal_type_confirmation" id="confirmation-modal">
      <div class="modal__content modal__content_type_confirmation">
        <button class="modal__close-btn"></button>
        <p class="modal__text">
          Hi, {name}! Your reservation for {count} has been made for {date}. A
          confirmation email has been sent to {email}.
        </p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
